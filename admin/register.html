<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊 - 我的線上商店</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <a href="admin_login.html" class="admin-login-link" title="前往後台管理">後台登入</a>
        <h1>我的線上商店</h1>
    </header>
    <nav>
        <a href="index.html">首頁</a>
        <a href="products.html">產品</a>
        <a href="about.html">關於我們</a>
        <a href="contact.html">聯絡我們</a>
        <a href="login.html" id="nav-login-link">登入/註冊</a>
        <a href="#" id="cart-icon">購物車 (<span id="cart-count">0</span>)</a>
    </nav>

    <div class="container">
        <h2>會員註冊</h2>
        <form id="register-form" class="contact-form">
            <div class="form-group">
                <label for="email">電子郵件</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">設定密碼</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">確認密碼</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <button type="submit" class="submit-btn">建立帳號</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">已經有帳號了嗎？ <a href="login.html">立即登入</a></p>
    </div>

    <!-- 購物車 Modal (為了讓所有頁面功能一致) -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>您的購物車</h2>
            <div id="cart-items"></div>
            <hr>
            <h3>總計: <span id="cart-total">NT$ 0</span></h3>
            <button id="checkout-btn">前往結帳</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 我的線上商店. 版權所有.</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
