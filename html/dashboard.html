<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商店後台</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <header class="admin-header">
        <h1>商店後台儀表板</h1>
        <div>
            <a href="../html/products.html" target="_blank" class="view-site-link">查看前台</a>
            <button id="logout-btn">登出</button>
        </div>
    </header>

    <main class="admin-container">
        <section class="admin-section">
            <h2>商品管理</h2>
            <form id="add-product-form">
                <div class="form-group">
                    <label for="product-name">商品名稱</label>
                    <input type="text" id="product-name" required>
                </div>
                <div class="form-group">
                    <label for="product-price">商品價格</label>
                    <input type="number" id="product-price" required min="0" step="1" placeholder="只能輸入數字">
                </div>
                <div class="form-group">
                    <label for="product-image">商品圖片URL</label>
                    <input type="url" id="product-image" placeholder="https://via.placeholder.com/250">
                </div>
                <button type="submit">新增商品</button>
            </form>
            <hr style="margin: 2rem 0;">
            <h3>現有商品列表</h3>
            <div id="product-list-container">
                <!-- Product list will be rendered here -->
            </div>
        </section>

        <section class="admin-section">
            <h2>會員管理</h2>
            <div id="user-list-container">
                <!-- User list will be rendered here -->
            </div>
        </section>
    </main>

    <!-- Edit Product Modal -->
    <div id="edit-product-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>編輯商品</h2>
            <form id="edit-product-form">
                <input type="hidden" id="edit-product-id">
                <div class="form-group">
                    <label for="edit-product-name">商品名稱</label>
                    <input type="text" id="edit-product-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-product-price">商品價格</label>
                    <input type="number" id="edit-product-price" required min="0" step="1">
                </div>
                <div class="form-group">
                    <label for="edit-product-image">商品圖片URL</label>
                    <input type="url" id="edit-product-image">
                </div>
                <button type="submit">儲存變更</button>
            </form>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
