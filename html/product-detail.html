<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品詳情 - 我的線上商店</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <a href="../admin/index.html" class="admin-login-link" title="前往後台管理">後台登入</a>
        <h1>我的線上商店</h1>
        <button class="hamburger-menu">
            <span></span>
            <span></span>

        </button>
    </header>
    <nav id="main-nav">
        <a href="index.html">首頁</a>
        <a href="products.html">產品</a>

            <button id="checkout-btn">前往結帳</button>
