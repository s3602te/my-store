<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 - 我的線上商店</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <a href="../admin/index.html" class="admin-login-link" title="前往後台管理">後台登入</a>
        <h1>我的線上商店</h1>
        <button class="hamburger-menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>
    <nav id="main-nav">
        <a href="index.html">首頁</a>
        <a href="products.html">產品</a>
        <a href="about.html">關於我們</a>
        <a href="contact.html">聯絡我們</a>
        <a href="login.html" id="nav-login-link">登入/註冊</a>
        <a href="#" id="cart-icon">購物車 (<span id="cart-count">0</span>)</a>
    </nav>

    <div class="container">
        <h2>聯絡我們</h2>
        <p>有任何問題或建議嗎？歡迎填寫下方的表單與我們聯繫！</p>

        <form id="contact-form" class="contact-form">
            <div class="form-group">
                <label for="name">您的姓名</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">您的電子郵件</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">您的訊息</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit" class="submit-btn">送出訊息</button>
        </form>
    </div>

    <!-- 購物車 Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>您的購物車</h2>
            <div id="cart-items"></div>
            <hr>
            <h3>總計: <span id="cart-total">NT$ 0</span></h3>
            <button id="checkout-btn">前往結帳</button>
        </div>
    </div>

    <button id="back-to-top-btn" title="回到頂部">▲</button>

    <footer>
        <p>&copy; 2024 我的線上商店. 版權所有.</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
